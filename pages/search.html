<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/main.css" />
    <title>Spotify - Search</title>
  </head>
  <body>
    <aside class="sidebar"></aside>

    <header class="top-header"></header>

    <main class="main-content">
      <!--Search Main Content-->
      <div class="main-content-search">
        <!--Recent Searches-->
        <section class="recent-searches">
          <h3>Recent searches</h3>
          <div class="searches-article">
            <figure class="searches-card">
              <img src="../assets/search-card/daft-punk.png" alt="daft-punk" />
              <figcaption>Daft Punk</figcaption>
            </figure>
            <figure class="searches-card">
              <img
                src="../assets/search-card/david-browie.png"
                alt="David-Browie"
              />
              <figcaption>David Browie</figcaption>
            </figure>
            <figure class="searches-card">
              <img
                src="../assets/search-card/black-holes.png"
                alt="black-holes"
              />
              <figcaption class="dif-figcaption">Black Holes...</figcaption>
              <h5>Muse</h5>
            </figure>
          </div>
        </section>
        <!--Browse all-->
        <section class="browse-all">
          <h2>Browse all</h2>

          <!--Browse all Discover-->
          <h3>Discover</h3>
          <section class="browse-all-article">
            <article class="browse-all-card">
              <div class="card-block-made"></div>
              <img
                src="../assets/search-card/discover1.png"
                alt="RED HOT CHILL PEPPERS"
              />
              <h4>Made For You</h4>
            </article>
            <article class="browse-all-card">
              <div class="card-block-frid"></div>
              <img
                src="../assets/search-card/discover2.png"
                alt="NEW MUSIC FRID"
              />
              <h4>New Releases</h4>
            </article>
            <article class="browse-all-card">
              <div class="card-block-classics"></div>
              <img
                src="../assets/search-card/discover3.png"
                alt="Spotify Classics"
              />
              <h4>Spotify Classics</h4>
            </article>
            <article class="browse-all-card">
              <div class="card-block-global"></div>
              <img
                src="../assets/search-card/discover4.png"
                alt="Top Songs Global"
              />
              <h4>Charts</h4>
            </article>
            <article class="browse-all-card">
              <div class="card-block-internet"></div>
              <img
                src="../assets/search-card/discover5.png"
                alt="Big On The Internet"
              />
              <h4>Trending</h4>
            </article>
            <article class="browse-all-card">
              <div class="card-block-wekly"></div>
              <img
                src="../assets/search-card/discover6.png"
                alt="Your Discover Weekly"
              />
              <h4>Discover</h4>
            </article>
            <article class="browse-all-card">
              <div class="card-block-hits"></div>
              <img src="../assets/search-card/discover7.png" alt="Hits" />
              <h4>Spotify Singles</h4>
            </article>
            <article class="browse-all-card">
              <div class="card-block-ail"></div>
              <img src="../assets/search-card/discover8.png" alt="AIL" />
              <h4>Decades</h4>
            </article>
          </section>
        </section>
        <section class="browse-all">
          <!--Browse all Genre-->
          <h3>Genres</h3>
          <div class="browse-all-article">
            <article class="browse-all-card">
              <div class="card-block-thit"></div>
              <img src="../assets/search-card/genres1.png" alt="TTHIT" />
              <h4>Pop</h4>
            </article>
            <article class="browse-all-card">
              <div class="card-block-hot"></div>
              <img src="../assets/search-card/genres2.png" alt="Hot Country" />
              <h4>Country</h4>
            </article>
            <article class="browse-all-card">
              <div class="card-block-hip"></div>
              <img src="../assets/search-card/genres3.png" alt="Rap" />
              <h4>Hip-Hop</h4>
            </article>
            <article class="browse-all-card">
              <div class="card-block-maroon"></div>
              <img src="../assets/search-card/genres4.png" alt="Marroon" />
              <h4>Rock</h4>
            </article>
            <article class="browse-all-card">
              <div class="card-block-all"></div>
              <img
                src="../assets/search-card/genres5.png"
                alt="All New Music"
              />
              <h4>Indie</h4>
            </article>
            <article class="browse-all-card">
              <div class="card-block-punk"></div>
              <img
                src="../assets/search-card/genres6.png"
                alt="Punk Essential"
              />
              <h4>Punk</h4>
            </article>
            <article class="browse-all-card">
              <div class="card-block-metal"></div>
              <img src="../assets/search-card/genres7.png" alt="Kick a Metal" />
              <h4>Metal</h4>
            </article>
            <article class="browse-all-card">
              <div class="card-block-guitar"></div>
              <img
                src="../assets/search-card/genres8.png"
                alt="Peaceful Guitar"
              />
              <h4>Instrumental</h4>
            </article>
          </div>
        </section>
      </div>
    </main>

    <footer class="player-bar"></footer>
  </body>
</html>
