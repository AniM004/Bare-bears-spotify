<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/main.css" />
    <title>Spotify - Library</title>
  </head>
  <body>
    <aside class="sidebar"></aside>

    <header class="top-header"></header>

    <main class="main-content">
      <section class="main-container-library-list">
        <section class="main-container-head">
          <!-- navbar  -->
          <nav>
            <ul class="library-nav-wrapper">
              <li class="library-actions-wrapper">
                <ul class="display-icons">
                  <li>
                    <a href="#"
                      ><img src="../assets/icons/display-list.svg" alt=""
                    /></a>
                  </li>
                  <li>
                    <a href="./library.html"
                      ><img src="../assets/icons/grid-icon.png" alt=""
                    /></a>
                  </li>
                </ul>
                <ul class="alligment-icons">
                  <li>
                    <a href="#" class="icon-flex">
                      <img src="../assets/icons/alignment.svg" alt="" />
                      <p>Recent</p>
                    </a>
                  </li>
                  <li>
                    <a href="#" class="icon-flex">
                      <img src="../assets/icons/group-icon.svg" alt="" />
                      <p>Group</p>
                    </a>
                  </li>
                  <li>
                    <a href="#">
                      <img src="../assets/icons/search-icon.svg" alt="" />
                    </a>
                  </li>
                </ul>
              </li>
              <li class="add-button">
                <a href="#"><img src="../assets/icons/plus-icon.svg" alt="" /></a>
              </li>
            </ul>
          </nav>
        </section>

        <!-- playlist main container  -->
        <!-- playlist divider  -->
        <section class="playlist-container-wrapper">
          <div class="divider">
            <p class="divider-numb">#</p>
            <p>Title</p>
            <p>Album</p>
            <p>Duration</p>
            <p></p>
          </div>
          <!-- grid rows -->
          <section class="playlist-container">
            <!-- grid rows  -->
            <!-- 1  -->
            <p class="list">1</p>
            <figure class="title-wrapper">
              <img src="../assets/images/duft-punk-small.png" alt="" />

              <figcaption class="text-wrapper">
                <p class="song-title">Get Lucky</p>
                <p class="artist-title">Daft Punk</p>
              </figcaption>
            </figure>
            <div class="album-name">
              <p>Random Access Memories</p>
            </div>
            <div class="duration">
              <p>4:35</p>
            </div>
            <input type="checkbox" id="heart-icon-1" />
            <label for="heart-icon-1" class="heart-label"> </label>

            <!-- 2  -->
            <p class="list">2</p>
            <figure class="title-wrapper">
              <img src="../assets/images/duft-punk-small.png" alt="" />

              <figcaption class="text-wrapper">
                <p class="song-title">Instant Crush</p>
                <p class="artist-title">Daft Punk, Julian Casablancas</p>
              </figcaption>
            </figure>
            <div class="album-name">
              <p>Random Access Memories</p>
            </div>
            <div class="duration">
              <p>5:37</p>
            </div>
            <input type="checkbox" id="heart-icon-2" />
            <label for="heart-icon-2" class="heart-label"> </label>

            <!-- 3  -->
            <p class="list">3</p>
            <figure class="title-wrapper">
              <img src="../assets/images/gorillaz.png" alt="Gorillaz cover" />

              <figcaption class="text-wrapper">
                <p class="song-title">On Melancholy Hill</p>
                <p class="artist-title">Gorillaz</p>
              </figcaption>
            </figure>
            <div class="album-name">
              <p>Plastic Beach</p>
            </div>
            <div class="duration">
              <p>3:53</p>
            </div>
            <input type="checkbox" id="heart-icon-3" />
            <label for="heart-icon-3" class="heart-label"> </label>
            <!-- 4  -->

            <p class="list">4</p>
            <figure class="title-wrapper">
              <img src="../assets/images/soft-cell.png" alt="Soft Cell cover" />

              <figcaption class="text-wrapper">
                <p class="song-title">Tainted Love</p>
                <p class="artist-title">Soft Cell</p>
              </figcaption>
            </figure>
            <div class="album-name">
              <p>Non-Stop Erotic Cabaret</p>
            </div>
            <div class="duration">
              <p>2:33</p>
            </div>
            <input type="checkbox" id="heart-icon-4" />
            <label for="heart-icon-4" class="heart-label"> </label>
            <!-- 5  -->

            <p class="list">5</p>
            <figure class="title-wrapper">
              <img
                src="../assets/images/punk-title-cover.png"
                alt="Daft Punk cover"
              />

              <figcaption class="text-wrapper">
                <p class="song-title">One More Time</p>
                <p class="artist-title">Daft Punk</p>
              </figcaption>
            </figure>
            <div class="album-name">
              <p>Discovery</p>
            </div>
            <div class="duration">
              <p>5:20</p>
            </div>
            <input type="checkbox" id="heart-icon-5" />
            <label for="heart-icon-5" class="heart-label"> </label>

            <!-- 6  -->
            <p class="list">6</p>
            <figure class="title-wrapper">
              <img src="../assets/images/mgmt-cover.png" alt=">MGMT cover" />

              <figcaption class="text-wrapper">
                <p class="song-title">Oracular Spectacular</p>
                <p class="artist-title">MGMT</p>
              </figcaption>
            </figure>
            <div class="album-name">
              <p>Oracular Spectacular</p>
            </div>
            <div class="duration">
              <p>3:49</p>
            </div>
            <input type="checkbox" id="heart-icon-6" />
            <label for="heart-icon-6" class="heart-label"> </label>
            <!-- 7  -->
            <p class="list">7</p>
            <figure class="title-wrapper">
              <img
                src="../assets/images/duft-punk-small.png"
                alt=">MGMT cover"
              />

              <figcaption class="text-wrapper">
                <p class="song-title">Give Life Back to Music</p>
                <p class="artist-title">Daft Punk</p>
              </figcaption>
            </figure>
            <div class="album-name">
              <p>Random Access Memories</p>
            </div>
            <div class="duration">
              <p>4:35</p>
            </div>
            <input type="checkbox" id="heart-icon-7" />
            <label for="heart-icon-7" class="heart-label"> </label>
          </section>
        </section>
      </section>
    </main>

    <footer class="player-bar"></footer>
  </body>
</html>
