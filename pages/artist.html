<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/main.css" />
    <title>Spotify - Artist</title>
  </head>
  <body>
    <aside class="sidebar"></aside>

    <header class="top-header"></header>

    <main class="main-content main-content-artist-border">
      <div class="main-content-artist-home">
        <div class="top-header-artist">
          <div class="header-absolute">
            <div class="header-title">
              <h1>Daft Punk</h1>
              <p>20,795,080 monthly listeners</p>
            </div>
            <ul class="header-absolute-nav">
              <li>
                <a href="#"
                  ><img src="../assets/artist-section/play-png.png" alt="play"
                /></a>
              </li>
              <li class="follow"><a href="#">Follow</a></li>
              <li>
                <a href="#"
                  ><img src="../assets/artist-section/add.png" alt="add"
                /></a>
              </li>
              <li>
                <a href="#"
                  ><img
                    src="../assets/artist-section/filetr-add-png.png"
                    alt="add-filter"
                /></a>
              </li>
              <li>
                <a href=""
                  ><img
                    src="../assets/artist-section/point-png.png"
                    alt="point"
                /></a>
              </li>
            </ul>
          </div>
        </div>
        <div class="sect-topheader-nav">
          <ul class="section-header-nav">
            <li><a href="">Home</a></li>
            <li><a href="">Albums</a></li>
            <li><a href="">Singles and Eps</a></li>
            <li><a href="">Compilations</a></li>
            <li><a href="">Merch</a></li>
            <li><a href="">About</a></li>
            <li><a href="">Features & More</a></li>
            <li>
              <a href=""
                ><img
                  src="../assets/artist-section/search-png.png"
                  alt="search"
              /></a>
            </li>
          </ul>
        </div>
        <div class="daft-section">
          <div class="daft-section-left">
            <h3>Your most Played</h3>
            <div class="card-list">
              <h4>1</h4>
              <article class="card-list-left">
                <figure>
                  <img
                    src="../assets/artist-section/one-more-time.png"
                    alt="one-more-time"
                  />
                  <div class="figcaption-title">
                    <h5>One More Time</h5>
                    <p>Daft Punk</p>
                  </div>
                </figure>
                <ul>
                  <li class="time">5:20</li>
                  <li class="liked">
                    <a href=""
                      ><img
                        src="../assets/artist-section/heart-png.png"
                        alt="liked"
                    /></a>
                  </li>
                </ul>
              </article>
            </div>
            <div class="card-list">
              <h4>2</h4>
              <article class="card-list-left">
                <figure>
                  <img
                    src="../assets/artist-section/give-life-get.png"
                    alt="give-life-get"
                  />
                  <div class="figcaption-title">
                    <h5>One More Time</h5>
                    <p>Daft Punk</p>
                  </div>
                </figure>
                <ul>
                  <li class="time">5:20</li>
                  <li class="liked">
                    <a href=""
                      ><img
                        src="../assets/artist-section/heart-png.png"
                        alt="liked"
                    /></a>
                  </li>
                </ul>
              </article>
            </div>
            <div class="card-list">
              <h4>3</h4>
              <article class="card-list-left">
                <figure>
                  <img
                    src="../assets/artist-section/give-life-get.png"
                    alt="give-life-get"
                  />
                  <div class="figcaption-title">
                    <h5>One More Time</h5>
                    <p>Daft Punk</p>
                  </div>
                </figure>
                <ul>
                  <li class="time">5:20</li>
                  <li class="liked">
                    <a href=""
                      ><img
                        src="../assets/artist-section/heart-png.png"
                        alt="liked"
                    /></a>
                  </li>
                </ul>
              </article>
            </div>
            <div class="card-list">
              <h4>4</h4>
              <article class="card-list-left">
                <figure>
                  <img
                    src="../assets/artist-section/give-life-get.png"
                    alt="give-life-get"
                  />
                  <div class="figcaption-title">
                    <figcaption>One More Time</figcaption>
                    <p>Daft Punk</p>
                  </div>
                </figure>
                <ul>
                  <li class="time">5:20</li>
                  <li class="liked">
                    <a href=""
                      ><img
                        src="../assets/artist-section/heart.svg"
                        alt="liked"
                    /></a>
                  </li>
                </ul>
              </article>
            </div>
          </div>
          <div class="daft-section-left section-right">
            <h3>Artist Pick</h3>
            <article class="card-border">
              <figure>
                <div class="card-border-shadow">
                  <div class="border-shadow"></div>
                  <img
                    src="../assets/artist-section/one-more-time.png"
                    alt="daft-punck"
                  />
                </div>
                <figcaption>Listen to the Best of Daft Punk</figcaption>
              </figure>
            </article>
            <article class="card">
              <img
                src="../assets/artist-section/artist-pick.png"
                alt="artist"
              />
            </article>
          </div>
        </div>
      </div>
    </main>

    <footer class="player-bar"></footer>
  </body>
</html>
